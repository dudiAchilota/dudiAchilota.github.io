
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
body{font-family:var(--font-sans)}
.screen{display:none;padding:0.75rem 0 1.5rem}
.screen.active{display:block}

.hero{background:#534AB7;border-radius:var(--border-radius-lg);padding:1.25rem 1rem;text-align:center;margin-bottom:1rem}
.hero-icon{font-size:36px;color:#EEEDFE;margin-bottom:6px}
.hero-title{font-size:20px;font-weight:500;color:#EEEDFE;margin-bottom:3px}
.hero-sub{font-size:12px;color:#AFA9EC}

.level-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.lc{border:2px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:0.75rem 0.5rem;cursor:pointer;text-align:center;background:var(--color-background-primary);transition:all 0.15s}
.lc:hover{border-color:#7F77DD;background:#EEEDFE}
.lc.sel{border-color:#534AB7;background:#534AB7}
.lc.sel .lci{color:#AFA9EC}
.lc.sel .lct{color:#EEEDFE}
.lc.sel .lcd{color:#AFA9EC}
.lci{font-size:22px;color:var(--color-text-secondary);margin-bottom:4px}
.lct{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:2px}
.lcd{font-size:11px;color:var(--color-text-secondary)}

.btn-go{width:100%;padding:14px;background:#1D9E75;border:none;border-radius:var(--border-radius-lg);color:#E1F5EE;font-size:16px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background 0.15s;min-height:52px}
.btn-go:active{background:#0F6E56;transform:scale(0.98)}

.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;gap:6px}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);font-size:13px;font-weight:500;cursor:pointer;min-height:40px}
.btn-sm:active{background:var(--color-background-secondary)}

.prog-wrap{background:var(--color-background-secondary);border-radius:99px;height:7px;overflow:hidden;margin-bottom:4px}
.prog-fill{height:7px;border-radius:99px;background:#534AB7;transition:width 0.35s}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:var(--color-text-secondary);margin-bottom:0.85rem}

.q-label{text-align:center;font-size:13px;color:var(--color-text-secondary);margin-bottom:0.6rem}
.q-label strong{color:var(--color-text-primary)}

.arena{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);gap:6px;align-items:start;margin-bottom:0.75rem}
.pcard{border:2.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:0.85rem 0.6rem;text-align:center;cursor:pointer;background:var(--color-background-primary);min-height:105px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;transition:all 0.15s;-webkit-tap-highlight-color:transparent}
.pcard:active{transform:scale(0.97)}
.pcard.hover-state{border-color:#7F77DD;background:#EEEDFE}
.pcard.correct{border-color:#1D9E75;background:#E1F5EE}
.pcard.wrong{border-color:#A32D2D;background:#FCEBEB}
.pcard.disabled{cursor:default;pointer-events:none}
.pp{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:500}
.pp.FW{background:#FAECE7;color:#993C1D}
.pp.MF{background:#E6F1FB;color:#185FA5}
.pp.DF{background:#EAF3DE;color:#3B6D11}
.pp.GK{background:#FAEEDA;color:#854F0B}
.pname{font-size:13px;font-weight:500;color:var(--color-text-primary);line-height:1.3;word-break:break-word}
.pcountry{font-size:11px;color:var(--color-text-secondary)}

.mid{display:flex;flex-direction:column;align-items:center;justify-content:center;padding-top:14px;gap:0}
.vs{background:#534AB7;color:#EEEDFE;border-radius:99px;padding:5px 9px;font-size:12px;font-weight:500}

.fb{border-radius:var(--border-radius-md);padding:11px 12px;font-size:13px;text-align:center;font-weight:500;margin-bottom:0.75rem;line-height:1.4}
.fb.ok{background:#E1F5EE;color:#085041;border:1px solid #5DCAA5}
.fb.no{background:#FCEBEB;color:#501313;border:1px solid #F09595}

.btn-next{width:100%;padding:13px;background:#534AB7;border:none;border-radius:var(--border-radius-lg);color:#EEEDFE;font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;min-height:50px;transition:background 0.15s}
.btn-next:active{background:#3C3489;transform:scale(0.98)}

.result-hero{background:#534AB7;border-radius:var(--border-radius-lg);padding:1.25rem;text-align:center;margin-bottom:1rem}
.rbadge{width:80px;height:80px;border-radius:50%;margin:0 auto 0.6rem;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(255,255,255,0.15);border:2.5px solid rgba(255,255,255,0.3)}
.rnum{font-size:26px;font-weight:500;color:#EEEDFE;line-height:1}
.rlbl{font-size:10px;color:#AFA9EC}
.rmsg{font-size:17px;font-weight:500;color:#EEEDFE;margin-bottom:3px}
.rsub{font-size:12px;color:#AFA9EC}

.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem}
.metric{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 6px;text-align:center}
.mv{font-size:20px;font-weight:500;color:var(--color-text-primary)}
.ml{font-size:11px;color:var(--color-text-secondary);margin-top:2px}

.save-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;margin-bottom:1rem}
.save-lbl{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.save-row{display:flex;gap:8px}
.save-row input{flex:1;font-size:14px;min-height:42px}
.btn-save{padding:0 16px;background:#1D9E75;border:none;border-radius:var(--border-radius-md);color:#E1F5EE;font-size:14px;font-weight:500;cursor:pointer;white-space:nowrap;min-height:42px;display:flex;align-items:center;gap:6px}
.btn-save:active{background:#0F6E56}
.save-msg{font-size:12px;margin-top:6px;color:var(--color-text-secondary)}

.act-row{display:flex;gap:8px;margin-top:0.5rem}
.btn-replay{flex:1;padding:12px;background:#1D9E75;border:none;border-radius:var(--border-radius-lg);color:#E1F5EE;font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px}
.btn-replay:active{background:#0F6E56}
.btn-home{flex:1;padding:12px;background:var(--color-background-primary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);color:var(--color-text-primary);font-size:14px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;min-height:48px}
.btn-home:active{background:var(--color-background-secondary)}

.lb-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem}
.lb-ttl{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px}
.lb-row{display:grid;grid-template-columns:26px 1fr auto auto;gap:6px;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px}
.rk{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0}
.r1{background:#FAEEDA;color:#633806}
.r2{background:#F1EFE8;color:#444441}
.r3{background:#FAECE7;color:#712B13}
.rn{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.lv-pill{font-size:10px;padding:2px 6px;border-radius:99px;background:#EEEDFE;color:#3C3489;white-space:nowrap}
.sc-val{font-weight:500;color:#534AB7}

.tbl-search{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.tbl-search input,.tbl-search select{font-size:14px;min-height:40px}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{background:#534AB7;color:#EEEDFE;font-size:11px;text-transform:uppercase;letter-spacing:0.03em;padding:8px 6px;font-weight:500;cursor:pointer}
th:active{background:#3C3489}
td{padding:7px 6px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);font-size:12px}
tr:active td{background:var(--color-background-secondary)}
.tc{font-size:12px;color:var(--color-text-secondary);margin-top:4px}
</style>

<h2 class="sr-only">משחק ניחוש גיל שחקני כדורגל לפי תאריך לידה מלא</h2>

<div id="s-home" class="screen active">
  <div class="hero">
    <div class="hero-icon"><i class="ti ti-ball-football" aria-hidden="true"></i></div>
    <div class="hero-title">מי יותר מבוגר?</div>
    <div class="hero-sub">נחש מי מהשחקנים נולד קודם</div>
  </div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.6rem">
    <div style="font-size:14px;font-weight:500;color:var(--color-text-primary)">בחר רמה</div>
    <button class="btn-sm" onclick="showScreen('s-table')"><i class="ti ti-table" aria-hidden="true"></i> שחקנים</button>
  </div>
  <div class="level-grid">
    <div class="lc" id="lc-easy" onclick="selLv('easy')"><div class="lci"><i class="ti ti-seeding" aria-hidden="true"></i></div><div class="lct">קל</div><div class="lcd">אקראי</div></div>
    <div class="lc" id="lc-medium" onclick="selLv('medium')"><div class="lci"><i class="ti ti-flame" aria-hidden="true"></i></div><div class="lct">בינוני</div><div class="lcd">עד 8 שנים</div></div>
    <div class="lc" id="lc-hard" onclick="selLv('hard')"><div class="lci"><i class="ti ti-bolt" aria-hidden="true"></i></div><div class="lct">קשה</div><div class="lcd">עד 4 שנים</div></div>
  </div>
  <button class="btn-go" onclick="startGame()"><i class="ti ti-player-play" aria-hidden="true"></i> התחל משחק</button>
  <div style="margin-top:1rem" id="lb-home"></div>
</div>

<div id="s-game" class="screen">
  <div class="nav">
    <button class="btn-sm" onclick="confirmHome()"><i class="ti ti-arrow-left" aria-hidden="true"></i> חזור</button>
    <div style="font-size:12px;color:var(--color-text-secondary)" id="lv-lbl"></div>
    <div style="font-size:13px;font-weight:500;color:var(--color-text-primary)" id="q-ctr"></div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="prog" style="width:0%"></div></div>
  <div class="prog-meta"><span id="cor-cnt">0 נכון</span><span id="sc-now">ציון: —</span></div>
  <div class="q-label">לחץ על מי שנולד <strong>קודם</strong></div>
  <div class="arena">
    <div class="pcard" id="pc-a" ontouchstart="" onclick="answer('a')">
      <span class="pp FW" id="pa-pos">FW</span>
      <div class="pname" id="pa-name">שחקן א</div>
      <div class="pcountry" id="pa-country">מדינה</div>
    </div>
    <div class="mid"><div class="vs">VS</div></div>
    <div class="pcard" id="pc-b" ontouchstart="" onclick="answer('b')">
      <span class="pp MF" id="pb-pos">MF</span>
      <div class="pname" id="pb-name">שחקן ב</div>
      <div class="pcountry" id="pb-country">מדינה</div>
    </div>
  </div>
  <div id="fb-area"></div>
  <button class="btn-next" id="btn-next" onclick="nextQ()" style="display:none"><i class="ti ti-arrow-right" aria-hidden="true"></i> שאלה הבאה</button>
</div>

<div id="s-result" class="screen">
  <div class="result-hero">
    <div class="rbadge"><div class="rnum" id="r-pct">0</div><div class="rlbl">מתוך 100</div></div>
    <div class="rmsg" id="r-msg"></div>
    <div class="rsub" id="r-sub"></div>
  </div>
  <div class="metrics" id="r-met"></div>
  <div class="save-card">
    <div class="save-lbl">שמור תוצאה</div>
    <div class="save-row"><input type="text" id="save-nm" placeholder="הקלד שמך..." maxlength="30"><button class="btn-save" onclick="saveScore()"><i class="ti ti-device-floppy" aria-hidden="true"></i> שמור</button></div>
    <div class="save-msg" id="save-msg"></div>
  </div>
  <div id="lb-result"></div>
  <div class="act-row">
    <button class="btn-replay" onclick="startGame()"><i class="ti ti-refresh" aria-hidden="true"></i> שחק שוב</button>
    <button class="btn-home" onclick="showScreen('s-home')"><i class="ti ti-home" aria-hidden="true"></i> בית</button>
  </div>
</div>

<div id="s-table" class="screen">
  <div class="nav">
    <button class="btn-sm" onclick="showScreen('s-home')"><i class="ti ti-arrow-left" aria-hidden="true"></i> חזור</button>
    <div style="font-size:15px;font-weight:500;color:var(--color-text-primary)">שחקנים</div>
    <div class="tc" id="tbl-cnt"></div>
  </div>
  <div class="tbl-search">
    <input type="text" id="tq" placeholder="חיפוש שם..." oninput="renderTbl()">
    <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px">
      <select id="tp" onchange="renderTbl()"><option value="">כל הפוזיציות</option><option value="FW">תוקף</option><option value="MF">קשר</option><option value="DF">בלם</option><option value="GK">שוער</option></select>
      <select id="tc" onchange="renderTbl()"><option value="">כל המדינות</option></select>
    </div>
  </div>
  <div class="tbl-wrap">
    <table>
      <colgroup><col style="width:36%"><col style="width:24%"><col style="width:14%"><col style="width:26%"></colgroup>
      <thead><tr>
        <th onclick="sortTbl('n')">שם <span id="sn"></span></th>
        <th onclick="sortTbl('d')">תאריך לידה <span id="sd"></span></th>
        <th onclick="sortTbl('p')">עמדה <span id="sp"></span></th>
        <th onclick="sortTbl('c')">מדינה <span id="sc"></span></th>
      </tr></thead>
      <tbody id="tb"></tbody>
    </table>
  </div>
</div>

function dateMs(s){return new Date(s).getTime();}
function diffLabel(d1s,d2s){
  const t1=dateMs(d1s),t2=dateMs(d2s);
  const diffMs=Math.abs(t1-t2);
  const days=Math.round(diffMs/(1000*60*60*24));
  if(days===0)return"אותו יום";
  if(days<30){return days===1?"יום אחד":days+" ימים";}
  const months=Math.round(days/30.44);
  if(months<12){return months===1?"חודש אחד":months+" חודשים";}
  const years=Math.round(days/365.25);
  return years===1?"שנה אחת":years+" שנים";
}
function fmtDate(s){const[y,m,d]=s.split('-');return`${d}.${m}.${y}`;}
function yearDiff(d1,d2){return Math.abs(new Date(d1)-new Date(d2))/(365.25*24*3600*1000);}

const TOTAL=20;
let lv=localStorage.getItem('fg_lv')||'easy';
let gs={};
let lb=JSON.parse(localStorage.getItem('fg_lb')||'[]');
let ts={col:'n',dir:1};

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  if(id==='s-home'){selLv(lv);renderLB('lb-home');}
  if(id==='s-table'){fillCtr();renderTbl();}
  if(id==='s-result')renderLB('lb-result');
}
function selLv(l){
  lv=l;localStorage.setItem('fg_lv',l);
  document.querySelectorAll('.lc').forEach(c=>c.classList.remove('sel'));
  document.getElementById('lc-'+l).classList.add('sel');
}
function shuffle(a){const r=[...a];for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];}return r;}

function buildPairs(){
  const pool=shuffle(P);const pairs=[];const used=new Set();let tries=0;
  while(pairs.length<TOTAL&&tries<4000){
    tries++;
    const i=Math.floor(Math.random()*pool.length),j=Math.floor(Math.random()*pool.length);
    if(i===j)continue;
    const a=pool[i],b=pool[j],key=[Math.min(i,j),Math.max(i,j)].join('-');
    if(used.has(key))continue;
    const yd=yearDiff(a[1],b[1]);
    if(lv==='medium'&&yd>8)continue;
    if(lv==='hard'&&yd>4)continue;
    used.add(key);pairs.push([a,b]);
  }
  return pairs;
}

function startGame(){
  gs={pairs:buildPairs(),idx:0,correct:0,answered:false};
  const lm={easy:'קל',medium:'בינוני',hard:'קשה'};
  document.getElementById('lv-lbl').textContent='רמה: '+lm[lv];
  showScreen('s-game');loadQ();
}

function loadQ(){
  const[a,b]=gs.pairs[gs.idx];
  gs.answered=false;
  document.getElementById('q-ctr').textContent=`שאלה ${gs.idx+1}/${TOTAL}`;
  document.getElementById('prog').style.width=Math.round((gs.idx/TOTAL)*100)+'%';
  document.getElementById('cor-cnt').textContent=gs.correct+' נכון';
  const sc=gs.idx>0?Math.round((gs.correct/gs.idx)*100):null;
  document.getElementById('sc-now').textContent=sc!==null?'ציון: '+sc:'ציון: —';
  ['pc-a','pc-b'].forEach(id=>{const el=document.getElementById(id);el.className='pcard';el.style.cursor='pointer';el.style.pointerEvents='';});
  document.getElementById('fb-area').innerHTML='';
  document.getElementById('btn-next').style.display='none';
  const sp=(pre,p)=>{
    document.getElementById('p'+pre+'-name').textContent=p[0];
    document.getElementById('p'+pre+'-country').textContent=p[3];
    const pe=document.getElementById('p'+pre+'-pos');
    pe.textContent=p[2];pe.className='pp '+p[2];
  };
  sp('a',a);sp('b',b);
}

function answer(ch){
  if(gs.answered)return;
  gs.answered=true;
  ['pc-a','pc-b'].forEach(id=>{const el=document.getElementById(id);el.classList.add('disabled');el.style.pointerEvents='none';});
  const[a,b]=gs.pairs[gs.idx];
  const corr=dateMs(a[1])<dateMs(b[1])?'a':(dateMs(b[1])<dateMs(a[1])?'b':'tie');
  const ok=ch===corr||(corr==='tie');
  if(ok)gs.correct++;
  const dl=diffLabel(a[1],b[1]);
  const older=corr==='a'?a[0]:corr==='b'?b[0]:null;
  const olderDate=corr==='a'?a[1]:corr==='b'?b[1]:null;
  const fa=document.getElementById('fb-area');
  if(ok){
    const msg=corr==='tie'
      ?`<i class="ti ti-check" aria-hidden="true"></i> נכון! שניהם נולדו באותו יום`
      :`<i class="ti ti-check" aria-hidden="true"></i> נכון! ${older} יותר מבוגר ב-${dl}`;
    fa.innerHTML=`<div class="fb ok">${msg}</div>`;
    if(corr==='a')document.getElementById('pc-a').classList.add('correct');
    else if(corr==='b')document.getElementById('pc-b').classList.add('correct');
    else{document.getElementById('pc-a').classList.add('correct');document.getElementById('pc-b').classList.add('correct');}
  } else {
    const msg=`<i class="ti ti-x" aria-hidden="true"></i> אוי! ${older} נולד ב-${fmtDate(olderDate)} — יותר מבוגר ב-${dl}`;
    fa.innerHTML=`<div class="fb no">${msg}</div>`;
    if(ch==='a')document.getElementById('pc-a').classList.add('wrong');
    else document.getElementById('pc-b').classList.add('wrong');
    if(corr==='a')document.getElementById('pc-a').classList.add('correct');
    else document.getElementById('pc-b').classList.add('correct');
  }
  const nb=document.getElementById('btn-next');
  nb.style.display='flex';
  if(gs.idx===TOTAL-1){nb.innerHTML='<i class="ti ti-trophy" aria-hidden="true"></i> ראה תוצאות';nb.onclick=showResults;}
  else{nb.innerHTML='<i class="ti ti-arrow-right" aria-hidden="true"></i> שאלה הבאה';nb.onclick=nextQ;}
}

function nextQ(){gs.idx++;if(gs.idx>=TOTAL){showResults();return;}loadQ();}

function showResults(){
  const pct=Math.round((gs.correct/TOTAL)*100);
  gs.fp=pct;gs.fl=lv;
  showScreen('s-result');
  document.getElementById('r-pct').textContent=pct;
  const msgs=pct>=90?['מושלם!','ידע כדורגל יוצא דופן']:pct>=70?['כל הכבוד!','תוצאה מרשימה']:pct>=50?['לא רע!','אפשר להשתפר']:['המשך להתאמן','תגיע לשם בקרוב'];
  document.getElementById('r-msg').textContent=msgs[0];
  document.getElementById('r-sub').textContent=msgs[1];
  const lm={easy:'קל',medium:'בינוני',hard:'קשה'};
  document.getElementById('r-met').innerHTML=`<div class="metric"><div class="mv">${gs.correct}</div><div class="ml">נכון</div></div><div class="metric"><div class="mv">${TOTAL-gs.correct}</div><div class="ml">טעות</div></div><div class="metric"><div class="mv">${lm[lv]}</div><div class="ml">רמה</div></div>`;
  document.getElementById('save-msg').textContent='';document.getElementById('save-nm').value='';
}

function saveScore(){
  const name=document.getElementById('save-nm').value.trim();
  if(!name){document.getElementById('save-msg').textContent='אנא הקלד שם';return;}
  lb.push({name,score:gs.fp,level:gs.fl,date:new Date().toLocaleDateString('he-IL')});
  lb.sort((a,b)=>b.score-a.score);if(lb.length>20)lb=lb.slice(0,20);
  localStorage.setItem('fg_lb',JSON.stringify(lb));
  document.getElementById('save-msg').textContent='נשמר!';renderLB('lb-result');
}

function renderLB(cid){
  const el=document.getElementById(cid);
  if(!lb.length){el.innerHTML='';return;}
  const lm={easy:'קל',medium:'בינוני',hard:'קשה'};
  el.innerHTML=`<div class="lb-card" style="margin-top:1rem"><div class="lb-ttl"><i class="ti ti-trophy" aria-hidden="true"></i> טבלת שיאים</div>${lb.slice(0,10).map((e,i)=>{const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';return`<div class="lb-row"><div class="rk ${rc}">${i+1}</div><div style="font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${e.name}</div><span class="lv-pill">${lm[e.level]||''}</span><div class="sc-val">${e.score}</div></div>`;}).join('')}</div>`;
}

function confirmHome(){if(gs.idx>0&&!confirm('לצאת מהמשחק?'))return;showScreen('s-home');}

function fillCtr(){
  const s=document.getElementById('tc');if(s.options.length>1)return;
  [...new Set(P.map(p=>p[3]))].sort((a,b)=>a.localeCompare(b,'he')).forEach(c=>{const o=document.createElement('option');o.value=c;o.textContent=c;s.appendChild(o);});
}

function sortTbl(col){if(ts.col===col)ts.dir*=-1;else{ts.col=col;ts.dir=1;}renderTbl();}

function renderTbl(){
  const q=document.getElementById('tq').value.toLowerCase();
  const pos=document.getElementById('tp').value;
  const country=document.getElementById('tc').value;
  let data=P.filter(p=>(!q||p[0].toLowerCase().includes(q)||p[3].toLowerCase().includes(q))&&(!pos||p[2]===pos)&&(!country||p[3]===country));
  const ci={n:0,d:1,p:2,c:3}[ts.col];
  data.sort((a,b)=>ts.dir*(a[ci]<b[ci]?-1:a[ci]>b[ci]?1:0));
  document.getElementById('tbl-cnt').textContent=data.length+' שחקנים';
  ['n','d','p','c'].forEach(c=>{const el=document.getElementById('s'+c);if(el)el.textContent=ts.col===c?(ts.dir===1?'↑':'↓'):'';});
  document.getElementById('tb').innerHTML=data.map(p=>`<tr><td style="font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p[0]}</td><td>${fmtDate(p[1])}</td><td><span class="pp ${p[2]}">${p[2]}</span></td><td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p[3]}</td></tr>`).join('');
}

selLv(lv);renderLB('lb-home');
</script>
